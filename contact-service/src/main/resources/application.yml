spring:
  application:
    name: contact-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
server:
