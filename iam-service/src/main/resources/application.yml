spring:
  application:
    name: iam-service
  datasource:
    url: jdbc:h2:mem:iam;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
server:
  port: 8081
app:
  jwt:
    secret: smartmail-jwt-secret-key-at-least-32-bytes-long-for-hs256
    access-expire-seconds: 3600
    refresh-expire-seconds: 604800
