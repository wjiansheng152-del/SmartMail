spring:
  cloud:
    gateway:
      routes:
        - id: iam
          uri: http://iam:8081
          predicates:
            - Path=/api/iam/**
        - id: contact
          uri: http://contact:8082
          predicates:
            - Path=/api/contact/**
        - id: template
          uri: http://template:8083
          predicates:
            - Path=/api/template/**
        - id: campaign
          uri: http://campaign:8084
          predicates:
            - Path=/api/campaign/**
        - id: scheduler
          uri: http://scheduler:8085
          predicates:
            - Path=/api/scheduler/**
        - id: delivery
          uri: http://delivery:8086
          predicates:
            - Path=/api/delivery/**
        - id: tracking
          uri: http://tracking:8087
          predicates:
            - Path=/api/tracking/**
        - id: audit
          uri: http://audit:8088
          predicates:
            - Path=/api/audit/**
