spring:
  application:
    name: gateway-service
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        - id: iam
          uri: http://localhost:8081
          predicates:
            - Path=/api/iam/**
        - id: contact
          uri: http://localhost:8082
          predicates:
            - Path=/api/contact/**
        - id: template
          uri: http://localhost:8083
          predicates:
            - Path=/api/template/**
        - id: campaign
          uri: http://localhost:8084
          predicates:
            - Path=/api/campaign/**
        - id: scheduler
          uri: http://localhost:8085
          predicates:
            - Path=/api/scheduler/**
        - id: delivery
          uri: http://localhost:8086
          predicates:
            - Path=/api/delivery/**
        - id: tracking
          uri: http://localhost:8087
          predicates:
            - Path=/api/tracking/**
        - id: audit
          uri: http://localhost:8088
          predicates:
            - Path=/api/audit/**
server:
  port: 8080
app:
  jwt:
    secret: smartmail-jwt-secret-key-at-least-32-bytes-long-for-hs256
